<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rate Us</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #121212;
      color: #fff;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1E1E1E;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 5px;
    }

    p {
      color: #ccc;
      font-size: 14px;
    }

    .steps p {
      margin: 5px 0;
    }

    select, textarea {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2A2A2A;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    textarea:focus, select:focus {
      border: 1px solid #FFD600;
    }

    .btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      font-size: 15px;
    }

    .primary {
      background: #FFD600;
      color: #000;
    }

    .secondary {
      background: #333;
      color: #fff;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>⭐ Rate Your Experience</h1>
    <p>Takes less than 30 seconds</p>

    <div class="steps">
      <p>1. Select staff (optional)</p>
      <p>2. Edit review</p>
      <p>3. Copy & Continue</p>
    </div>

    <!-- Staff Dropdown -->
    <select id="staffSelect" onchange="updateReview()">
      <option value="">Select Staff (Optional)</option>
      <option>Kamna</option>
      <option>Sana</option>
      <option>Rahul</option>
      <option>Nikhil</option>
      <option>Yaseen</option>
      <option>Vaibhav</option>
      <option>Amandeep</option>
      <option>Arun</option>
      <option>Swapnil</option>
    </select>

    <!-- Editable Review -->
    <textarea id="reviewText"></textarea>

    <!-- Copy -->
    <button class="btn secondary" onclick="copyText()">Copy Review</button>

    <!-- Platform Choice -->
    <p style="margin-top:15px;">Choose where you want to review:</p>

    <!-- Google -->
    <a href="https://search.google.com/local/writereview?placeid=ChIJ-QAAQObH5zsRrDxQZOGu0ds" target="_blank">
      <button class="btn primary">Continue to Google Review</button>
    </a>

    <!-- Zomato -->
    <a href="https://link.zomato.com/xqzv/rshare?id=1328489136fbb945d" target="_blank">
      <button class="btn secondary">Continue to Zomato Review</button>
    </a>

    <div class="footer">Thank you ❤️</div>

  </div>
</div>

<script>
const defaultReview = "Great pizza, amazing taste, quick service and friendly staff. Loved the ambience. Will visit again!";

const templates = [
  (name) => `Great pizza and amazing taste. ${name} provided excellent service. Will definitely visit again!`,
  (name) => `Loved the food and ambience. ${name} was very polite and gave great service. Highly recommended!`,
  (name) => `Amazing experience overall. Special thanks to ${name} for quick and friendly service!`,
  (name) => `Really enjoyed the pizza. ${name} was very helpful and service was top-notch.`,
  (name) => `Fantastic food and great vibe. ${name} made our experience even better. Will come again!`
];

document.getElementById("reviewText").value = defaultReview;

function updateReview() {
  const staff = document.getElementById("staffSelect").value;

  if (!staff) {
    document.getElementById("reviewText").value = defaultReview;
    return;
  }

  const randomTemplate = templates[Math.floor(Math.random() * templates.length)];
  document.getElementById("reviewText").value = randomTemplate(staff);
}

function copyText() {
  const text = document.getElementById("reviewText").value;
  navigator.clipboard.writeText(text);
  alert("Review copied!");
}
</script>

</body>
</html>
